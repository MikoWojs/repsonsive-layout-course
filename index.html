<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Product Preview Card</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Fraunces:wght@700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: hsl(30, 38%, 92%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      display: flex;
      max-width: 600px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    .card img {
      width: 50%;
      object-fit: cover;
    }

    .content {
      padding: 2rem;
      width: 50%;
    }

    .category {
      letter-spacing: 4px;
      color: gray;
      font-size: 12px;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Fraunces', serif;
      margin-bottom: 1rem;
    }

    .description {
      color: gray;
      font-size: 14px;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .price {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .new-price {
      color: hsl(158, 36%, 37%);
      font-size: 1.5rem;
      font-family: 'Fraunces', serif;
    }

    .old-price {
      text-decoration: line-through;
      color: gray;
    }

    button {
      width: 100%;
      padding: 1rem;
      border: none;
      background: hsl(158, 36%, 37%);
      color: white;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: hsl(158, 42%, 18%);
    }

    /* 📱 Mobile */
    @media (max-width: 600px) {
      .card {
        flex-direction: column;
      }

      .card img,
      .content {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="./images/image-product-desktop.jpg" alt="Perfume">

    <div class="content">
      <p class="category">PERFUME</p>

      <h1>Gabrielle Essence Eau De Parfum</h1>

      <p class="description">
        A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.
      </p>

      <div class="price">
        <span class="new-price">$149.99</span>
        <span class="old-price">$169.99</span>
      </div>

      <button>Add to Cart</button>
    </div>
  </div>

</body>
</html>
